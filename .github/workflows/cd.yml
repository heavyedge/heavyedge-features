name: CD

on: push

jobs:

  publish:

    runs-on: ubuntu-latest
  
    if: startsWith(github.event.ref, 'refs/tags')
  
    steps:

      - name: get repo
        uses: actions/checkout@v2

      - name: set up Python
        uses: actions/setup-python@v2

      - name: build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
